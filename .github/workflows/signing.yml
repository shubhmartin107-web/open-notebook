name: Sign Artifacts

on:
  release:
    types: [published]

jobs:
  sign:
    name: Sign release artifacts
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: Build release
        run: cargo build --release --manifest-path kernel/Cargo.toml
      - name: Sign binary with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: kernel/target/release/onb-kernel
      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: |
            kernel/target/release/onb-kernel.sigstore
            kernel/target/release/onb-kernel
